# Continuous Integration and Continuous Delivery CI/CD
name: Continuous Integration and Continuous Delivery/Deployment (CI/CD)

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente del repositorio en el servidor de GitHub
    - name: Descargar código fuente
      uses: actions/checkout@v4

    # 1. Configurar herramientas de Docker en el servidor de GitHub
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 2. Iniciar sesión en Docker Hub usando los Secretos seguros
    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Construir la imagen Y subirla automáticamente a Docker Hub (Push)
    # Usamos dos etiquetas (tags): 'latest' para la última versión y el SHA de git para tener historial.
    - name: Construir y Subir Imagen de Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          jadomiz/tracker-suite-backend:latest
          jadomiz/tracker-suite-backend:1.0.0